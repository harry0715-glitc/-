<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>施工人員名冊系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #020617;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app-shell {
        width: 100%;
        margin: 0 auto;
        overflow-x: hidden;
      }

      @media (min-width: 480px) {
        body {
          background: #0f172a;
        }

        .app-shell {
          max-width: 430px;
          box-shadow: 0 0 0 1px rgb(51 65 85 / 0.45), 0 32px 80px rgb(0 0 0 / 0.35);
        }

        .app-shell .fixed.bottom-0.left-0.right-0 {
          right: auto;
          left: 50%;
          width: 430px;
          max-width: 100%;
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
